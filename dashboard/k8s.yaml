apiVersion: v1
kind: Service
metadata:
  name: shudhi-sidecar
  namespace: atlas
spec:
  type: ClusterIP
  selector:
    app: beckn-app-backend-master
  ports:
  - port: 8900
    targetPort: 8900
    protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shudhi-dashboard
  namespace: atlas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shudhi-dashboard
  template:
    metadata:
      labels:
        app: shudhi-dashboard
    spec:
      containers:
      - name: dashboard
        image: ghcr.io/piyushkumar-1/shudhi-dashboard:main
        ports:
        - containerPort: 80
          protocol: TCP
        env:
        - name: SIDECAR_UPSTREAM
          value: http://shudhi-sidecar.atlas.svc.cluster.local:8900
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 50m
            memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: shudhi-dashboard
  namespace: atlas
spec:
  type: ClusterIP
  selector:
    app: shudhi-dashboard
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
